<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RUSH · plain HTML embed</title>
<style>
  body{margin:0; min-height:100vh; background:radial-gradient(120% 90% at 50% 0%, #2a0a52, #160033 40%, #070014); font-family:system-ui,sans-serif; color:#fff;
    display:flex; flex-direction:column; align-items:center; gap:18px; padding:30px 14px}
  h1{font-size:18px; letter-spacing:2px; opacity:.85}
  .row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
  button{padding:8px 14px; border-radius:8px; border:1px solid #0ff7ff; background:#0ff7ff22; color:#0ff7ff; font-weight:700; cursor:pointer}
  #log{font:12px monospace; color:#9ff; background:#0008; border:1px solid #0ff7ff44; border-radius:8px; padding:10px 12px; width:min(94vw,880px); height:120px; overflow:auto}
</style>
</head>
<body>
  <h1>&lt;neon-slot&gt; — plain HTML embed</h1>

  <div class="row">
    <button onclick="document.querySelector('neon-slot').setAttribute('engine','stylized')">engine: stylized</button>
    <button onclick="document.querySelector('neon-slot').setAttribute('engine','3d')">engine: 3d</button>
    <button onclick="document.querySelector('neon-slot').spin()">spin() via API</button>
    <button onclick="document.querySelector('neon-slot').setBalance(1000)">refill 1000</button>
  </div>

  <!-- the component -->
  <neon-slot balance="1000" bet="25" currency="COINS"></neon-slot>

  <div id="log"></div>

  <!-- three-src tells the 3D engine where Three.js lives (relative to this page) -->
  <script>window.NeonSlot = window.NeonSlot || {}; </script>
  <script src="../neon-slot.js"></script>
  <script>
    const el = document.querySelector('neon-slot');
    el.setAttribute('three-src', '../three.min.js');
    const log = (m) => { const d = document.getElementById('log'); d.innerHTML += m + '<br>'; d.scrollTop = d.scrollHeight; };
    ['spinstart','result','win','noresult','phasechange','risk','bank','bust','balancechange','betchange','engineerror']
      .forEach(ev => el.addEventListener(ev, e => log('• ' + ev + ' ' + JSON.stringify(e.detail))));
  </script>
</body>
</html>
